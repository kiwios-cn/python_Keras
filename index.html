<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 视频人脸提取系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        .video-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        #overlay { pointer-events: none; transition: all 0.1s; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-100 font-sans">

    <div class="max-w-[1400px] mx-auto p-6">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-blue-500">FACE <span class="text-white">EXTRACTOR</span></h1>
                <p class="text-slate-500 text-xs mt-1">智能视频抽帧 · 人脸识别 · 轨迹追踪</p>
            </div>
            <div id="status-tag" class="px-4 py-2 bg-slate-900 border border-slate-800 rounded-full text-xs flex items-center gap-2">
                <span class="w-2 h-2 bg-yellow-500 rounded-full" id="dot"></span>
                <span id="status-text">初始化算法模型...</span>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-12 lg:col-span-8">
                <div id="upload-box" class="aspect-video border-2 border-dashed border-slate-800 rounded-3xl flex flex-col items-center justify-center bg-slate-900/30 hover:bg-slate-900/50 hover:border-blue-500 transition-all cursor-pointer group">
                    <div class="w-16 h-16 bg-blue-600/10 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform">
                        <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    </div>
                    <p class="mt-4 text-slate-300 font-medium">点击上传待分析视频</p>
                    <p class="text-slate-500 text-sm mt-1">支持 MP4 / MOV (建议 5 分钟内)</p>
                    <input type="file" id="file-input" class="hidden" accept="video/*">
                </div>

                <div id="video-wrapper" class="hidden relative rounded-3xl overflow-hidden video-glow bg-black border border-slate-800">
                    <video id="video" class="w-full" controls></video>
                    <canvas id="overlay" class="absolute top-0 left-0"></canvas>
                </div>

                <div class="mt-6 p-4 bg-slate-900/50 rounded-2xl border border-slate-800 flex items-center justify-between">
                    <div class="flex gap-4">
                        <div class="text-center"><p class="text-[10px] text-slate-500 uppercase">当前帧</p><p id="current-frame" class="font-mono text-blue-400">00:00</p></div>
                        <div class="text-center border-l border-slate-700 pl-4"><p class="text-[10px] text-slate-500 uppercase">置信度阈值</p><p class="font-mono text-emerald-400">0.6</p></div>
                    </div>
                    <button id="re-upload" class="hidden text-xs text-slate-400 hover:text-white underline">重新上传</button>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-4 flex flex-col h-[75vh]">
                <div class="bg-slate-900/80 backdrop-blur-md rounded-3xl border border-slate-800 flex-grow flex flex-col overflow-hidden shadow-xl">
                    <div class="p-5 border-b border-slate-800 flex justify-between items-center">
                        <h2 class="font-bold text-sm tracking-widest text-slate-400">CAPTURED FACES</h2>
                        <span id="face-counter" class="bg-blue-600/20 text-blue-400 text-[10px] px-2 py-1 rounded-md font-bold">0 SAMPLES</span>
                    </div>
                    
                    <div id="log-list" class="flex-grow overflow-y-auto p-4 space-y-3">
                        <div class="text-center py-20 text-slate-600 text-sm">等待视频运行...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const uploadBox = document.getElementById('upload-box');
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const logList = document.getElementById('log-list');
        const faceCounter = document.getElementById('face-counter');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('dot');

        let isModelReady = false;
        let lastCaptureTime = 0;

        // 1. 初始化模型
        async function loadModels() {
            const URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(URL)
                ]);
                isModelReady = true;
                statusText.innerText = "准备就绪";
                statusDot.classList.replace('bg-yellow-500', 'bg-green-500');
            } catch (e) {
                statusText.innerText = "模型加载失败，请检查网络";
            }
        }

        // 2. 上传处理
        uploadBox.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                video.src = URL.createObjectURL(file);
                uploadBox.classList.add('hidden');
                document.getElementById('video-wrapper').classList.remove('hidden');
                document.getElementById('re-upload').classList.remove('hidden');
                logList.innerHTML = '';
            }
        };

        document.getElementById('re-upload').onclick = () => location.reload();

        // 3. 实时分析
        video.addEventListener('play', () => {
            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(canvas, displaySize);

            const interval = setInterval(async () => {
                if (video.paused || video.ended) {
                    clearInterval(interval);
                    return;
                }

                // 更新UI时间
                document.getElementById('current-frame').innerText = new Date(video.currentTime * 1000).toISOString().substr(14, 5);

                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.6 }));
                const resizedDetections = faceapi.resizeResults(detections, displaySize);

                // 绘图
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                faceapi.draw.drawDetections(canvas, resizedDetections);

                // 如果发现人脸，且距离上次抓拍超过1.5秒（避免重复抓拍同一秒）
                if (detections.length > 0 && (video.currentTime - lastCaptureTime > 1.5)) {
                    captureFace(detections[0], video.currentTime);
                    lastCaptureTime = video.currentTime;
                }
            }, 300); // 300ms 采样一次，性能较好
        });

        // 4. 抓拍并生成右侧卡片
        function captureFace(detection, timestamp) {
            // 创建一个临时 Canvas 截取人脸区域
            const tempCanvas = document.createElement('canvas');
            const box = detection.box;
            tempCanvas.width = 80;
            tempCanvas.height = 80;
            const ctx = tempCanvas.getContext('2d');
            
            // 从视频源截取坐标（简单缩略图）
            ctx.drawImage(video, box.x, box.y, box.width, box.height, 0, 0, 80, 80);
            const dataUrl = tempCanvas.toDataURL();

            const card = document.createElement('div');
            card.className = "flex items-center p-3 bg-slate-800/50 border border-slate-700 rounded-2xl hover:border-blue-500 cursor-pointer transition-all animate-in fade-in slide-in-from-right-4 duration-300";
            const timeStr = new Date(timestamp * 1000).toISOString().substr(14, 5);
            
            card.innerHTML = `
                <img src="${dataUrl}" class="w-12 h-12 rounded-xl object-cover border border-slate-600 shadow-lg">
                <div class="ml-4 flex-grow">
                    <p class="text-[10px] text-blue-400 font-bold uppercase tracking-tighter">NEW DETECTION</p>
                    <p class="text-sm font-medium text-white tracking-tight">人脸标记 @ ${timeStr}</p>
                </div>
                <div class="text-slate-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
                </div>
            `;
            
            card.onclick = () => {
                video.currentTime = timestamp;
                video.play();
            };

            if (logList.innerHTML.includes('等待视频')) logList.innerHTML = '';
            logList.prepend(card);
            
            // 更新计数
            const count = logList.children.length;
            faceCounter.innerText = `${count} SAMPLES`;
        }

        loadModels();
    </script>
</body>
</html>
